<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <!-- Premium Studio Lighting Gradient -->
    <linearGradient id="glass-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d212b" />
      <stop offset="50%" stop-color="#0a0c10" />
      <stop offset="100%" stop-color="#020304" />
    </linearGradient>
  </defs>
  
  <!-- Sleek Dark Base -->
  <rect width="256" height="256" rx="56" fill="url(#glass-bg)" />
  
  <!-- TECH BACKGROUND: Circuit Traces & Data Nodes -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top Left Circuit -->
    <path d="M 10 70 h 50 l 30 -30 v -40" />
    <circle cx="60" cy="70" r="8" fill="#0a0c10" stroke="rgba(255,255,255,0.08)" />

    <!-- Bottom Right Circuit -->
    <path d="M 246 186 h -50 l -30 30 v 40" />
    <circle cx="196" cy="186" r="8" fill="#0a0c10" stroke="rgba(255,255,255,0.08)" />

    <!-- Top Right Circuit (with subtle neon accent) -->
    <path d="M 170 10 v 40 l 30 30 h 56" />
    <circle cx="200" cy="80" r="7" fill="#0a0c10" stroke="rgba(99, 255, 176, 0.2)" stroke-width="4" />

    <!-- Bottom Left Accent -->
    <path d="M 10 176 h 30 l 30 30 v 50" />
    <circle cx="40" cy="176" r="5" fill="rgba(99, 255, 176, 0.15)" stroke="none" />
  </g>

  <!-- Glassmorphic Inner Bevel (3D Edge) -->
  <rect width="248" height="248" x="4" y="4" rx="52" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4" />
  
  <!-- Perfectly Centered Text Group -->
  <g transform="translate(124, 168)">
    
    <!-- 'SJ' Text (Right-anchored to the center) -->
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="110" fill="#ffffff" letter-spacing="-5" text-anchor="end">SJ</text>
    
    <!-- '.me' Text (Left-anchored to the center) -->
    <text x="4" y="0" font-family="monospace" font-weight="800" font-size="75" fill="#63ffb0" text-anchor="start">.me</text>
    
  </g>
</svg>
